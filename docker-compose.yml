version: "3.9"

services:
  app:
    build: .
    container_name: chat_app
    ports:
      - "8080:8080"
    env_file:
      - .env
    depends_on:
      - redis
      - postgres   # 👈 ADD THIS
    restart: always

  redis:
    image: redis:7-alpine
    container_name: chat_redis
    ports:
      - "6379:6379"
    restart: always

  postgres:   # 👈 ADD THIS WHOLE BLOCK
    image: postgres:15-alpine
    container_name: chat_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: chat
    ports:
      - "5432:5432"
    restart: always