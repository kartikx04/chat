version: '3.8'

services:
  app:
  build:
    context: .
    dockerfile: Dockerfile.prod
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy
  environment:
    DB_HOST: chat_postgres
    DB_PORT: 5432
    DB_USER: postgres
    DB_PASSWORD: password
    DB_NAME: chat
    DB_SSLMODE: disable
    REDIS_HOST: chat_redis
    REDIS_PORT: 6379

  redis:
    image: redis/redis-stack:latest
    container_name: chat_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 2s
      retries: 10

  postgres:
    image: postgres:15-alpine
    container_name: chat_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: chat
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 2s
      timeout: 2s
      retries: 10

volumes:
  redis_data:
  postgres_data: